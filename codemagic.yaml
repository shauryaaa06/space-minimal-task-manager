workflows:
  ios-release:
    name: Space iOS Release
    max_build_duration: 60
    environment:
      node: 20.20.2
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.shaurya.space"
        APP_NAME: "Space"
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Copy web assets to iOS
        script: |
          mkdir -p ios/App/App/public
          cp -r dist/* ios/App/App/public/

          # Always (re)create the two config files the Xcode project requires.
          # These get excluded by .gitignore, so we write them here to guarantee
          # they exist in the build, no matter what was cloned.
          cat > ios/App/App/capacitor.config.json <<'EOF'
          {
            "appId": "com.shaurya.space",
            "appName": "Space",
            "webDir": "dist",
            "ios": {
              "contentInset": "always",
              "deploymentTarget": "16.0"
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 0
              }
            }
          }
          EOF

          cat > ios/App/App/config.xml <<'EOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget version="1.0.0" xmlns="http://www.w3.org/ns/widgets">
              <access origin="*" />
          </widget>
          EOF

          echo "Confirmed config files exist:"
          ls -la ios/App/App/config.xml ios/App/App/capacitor.config.json

      - name: Pod install
        script: cd ios/App && pod install

      - name: Build iOS app (unsigned)
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            IPHONEOS_DEPLOYMENT_TARGET=16.0 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package unsigned .ipa for sideloading
        script: |
          # Wrap the built .app into an unsigned .ipa. Sideloadly / AltStore
          # re-sign this with the user's free Apple ID when installing, so it
          # does not need to be signed here.
          APP_PATH="build/Build/Products/Release-iphoneos/App.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: $APP_PATH not found. Searching for the built .app:"
            find build -name "*.app" -maxdepth 6 -print
            exit 1
          fi
          rm -rf Payload Space.ipa
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Space.ipa Payload >/dev/null
          echo "Built unsigned IPA:"
          ls -la Space.ipa

    artifacts:
      - Space.ipa
      - /tmp/xcodebuild_logs/*.log
