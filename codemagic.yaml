workflows:
  ios-release:
    name: Space iOS Release
    max_build_duration: 60
    environment:
      node: 20.20.2
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.shaurya.space"
        APP_NAME: "Space"
    scripts:
      - name: Install dependencies
        script: npm install

      - name: Build web app
        script: npm run build

      - name: Copy web assets to iOS
        script: |
          mkdir -p ios/App/App/public
          cp -r dist/* ios/App/App/public/
          cp capacitor.config.json ios/App/App/capacitor.config.json 2>/dev/null || true

      - name: Pod install
        script: cd ios/App && pod install

      - name: Build iOS app (unsigned)
        script: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - /tmp/xcodebuild_logs/*.log
